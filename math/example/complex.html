<!DOCTYPE html>
<html lang="zh">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta charset="UTF-8">
<title>复分析可视化</title>
<style>
body{background:#071b3f;color:#fff;margin:0;height:100vh}
canvas{display:block;width:100%!important;height:100%!important}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three'

const main = (app) => {
  const material = new THREE.ShaderMaterial({
    uniforms: {
      iTime: { value: 0 },
      iResolution: { value: new THREE.Vector2() },
      iTransform: { value: new THREE.Vector3() },
    },
    fragmentShader: `
    uniform float iTime;
    uniform vec2 iResolution;
    uniform vec3 iTransform;

    // 网格
    float grid(in vec2 uv, in float line_width) {
      vec2 f = fract(uv + vec2(line_width * 0.5));
      return step(abs(f.x), line_width) + step(abs(f.y), line_width);
    }

    // 热力图
    vec3 heatmap(in float value) {
      vec3 green = vec3(0., 1., 0.);
      vec3 yellow = vec3(1., 1., 0.);
      vec3 red = vec3(1., 0., 0.);
      vec3 color = vec3(0.);
      if (value < .5) {
        color = mix(green, yellow, 2. * value);
      } else {
        color = mix(yellow, red, 2. * value - 1.);
      }
      return color;
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - iTransform.xy) / iResolution.yy * vec2(iTransform.z);

      vec3 color = heatmap((sin(uv.x) + 1.) / 2.);

      color = mix(color, vec3(0.5), grid(uv, 0.02));
      gl_FragColor = vec4(color, 1.0);
    }
    `
  })
  const geometry = new THREE.PlaneGeometry(2, 2)
  const mesh = new THREE.Mesh(geometry, material)
  app.add(mesh)

  const transform = new THREE.Vector3(0, 0, 10) // x, y, scale
  app.canvas.onmousemove = (e) => {
    transform.x = e.clientX
    transform.y = app.canvas.clientHeight - e.clientY
  }
  app.canvas.onwheel = (e) => {
    const dy = e.deltaY / 100
    transform.z *= Math.pow(2, dy)
  }
  app.update = (time) => {
    time /= 1000
    const { iTime, iResolution, iTransform } = material.uniforms
    iTime.value = time
    iResolution.value.set(app.canvas.width, app.canvas.height)
    iTransform.value.copy(transform)
  }
  app.animate()
}

const app = window.app = {
  scene: new THREE.Scene(),
  renderer: new THREE.WebGLRenderer({ antialias: true, alpha: true }),
  get canvas () { return this.renderer.domElement },
  state: {},
  init (container = document.body) {
    window.THREE = THREE

    const aspect = container.clientWidth / container.clientHeight
    const camera = this.camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 1000)
    camera.position.set(0, 0, 10)

    this.renderer.setSize(container.clientWidth, container.clientHeight)
    this.renderer.autoClearColor = false
    container.appendChild(this.canvas)

    window.addEventListener('resize', () => {
      // this.camera.aspect = container.clientWidth / container.clientHeight
      // this.camera.updateProjectionMatrix()
      // this.renderer.setSize(container.clientWidth, container.clientHeight)
    })
  },
  animate (t) {
    requestAnimationFrame(app.animate)
    app.controls?.update()
    app.update && app.update(t)
    app.renderer.render(app.scene, app.camera)
  },
  add (...objs) {
    objs.forEach(obj => obj && this.scene.add(obj))
  },
}

app.init()
main(app)
</script>
</body>
</html>
